{% set name = "napari-power-widgets" %}
{% set version = "0.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/napari-power-widgets-{{ version }}.tar.gz
  sha256: 8259b28e2774cab10f7fd9de425c6e3a11a0cbfe3d245410d3bf600e2b4bbbfb

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - magicgui
    - napari
    - numpy
    - pandas
    - python >={{ python_min }}
    - typing-extensions

test:
  imports:
    - napari_power_widgets
  commands:
    - pip list
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/hanjinliu/napari-power-widgets
  summary: Powerful widgets and type annotations for napari plugin widgets
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - hanjinliu
    - jaimergp
